<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vantage - Algorithme de Trading Sportif</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-slate-900 text-slate-100 min-h-screen">

    <!-- NAVIGATION -->
    <nav class="border-b border-slate-800 bg-slate-900/50 backdrop-blur sticky top-0 z-50">
        <div class="max-w-6xl mx-auto px-4 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <div class="bg-emerald-500 text-slate-950 font-black px-2.5 py-1 rounded text-sm tracking-wider">VNTG</div>
                <span class="text-xl font-bold tracking-tight bg-gradient-to-r from-white to-slate-400 bg-clip-text text-transparent">VANTAGE</span>
            </div>
            <div class="flex items-center space-x-4" id="nav-actions">
                <!-- Les boutons seront injectés ici par Javascript selon l'état de connexion -->
            </div>
        </div>
    </nav>

    <!-- FENÊTRE DE CONNEXION (MODAL) CACHÉE PAR DÉFAUT -->
    <div id="auth-modal" class="fixed inset-0 z-[100] hidden bg-slate-950/80 backdrop-blur-sm flex items-center justify-center p-4">
        <div class="bg-slate-800 border border-slate-700 rounded-2xl w-full max-w-md p-8 relative shadow-2xl">
            <button onclick="fermerModal()" class="absolute top-4 right-4 text-slate-400 hover:text-white">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h2 class="text-2xl font-bold text-white mb-2">Espace VIP Vantage</h2>
            <p class="text-slate-400 text-sm mb-6">Connectez-vous pour accéder aux algorithmes.</p>
            
            <div id="auth-error" class="hidden bg-red-900/50 border border-red-500 text-red-200 text-xs p-3 rounded mb-4"></div>
            <div id="auth-success" class="hidden bg-emerald-900/50 border border-emerald-500 text-emerald-200 text-xs p-3 rounded mb-4"></div>

            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Email</label>
                    <input type="email" id="email-input" class="w-full bg-slate-900 border border-slate-700 rounded p-2.5 text-white focus:border-emerald-500 focus:outline-none transition-colors" placeholder="votre@email.com">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Mot de passe</label>
                    <input type="password" id="password-input" class="w-full bg-slate-900 border border-slate-700 rounded p-2.5 text-white focus:border-emerald-500 focus:outline-none transition-colors" placeholder="••••••••">
                </div>
                <div class="grid grid-cols-2 gap-4 pt-2">
                    <button onclick="creerCompte()" class="bg-slate-700 hover:bg-slate-600 text-white font-bold py-2.5 rounded transition-colors text-sm">S'inscrire</button>
                    <button onclick="seConnecter()" class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 font-bold py-2.5 rounded shadow-[0_0_10px_rgba(16,185,129,0.3)] transition-colors text-sm">Se connecter</button>
                </div>
            </div>
        </div>
    </div>

    <!-- CONTENU PRINCIPAL -->
    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="flex justify-center mb-10">
            <div class="bg-slate-800/60 p-1.5 rounded-lg inline-flex border border-slate-700/60 backdrop-blur">
                <button id="btn-core" onclick="changerCircuit('ATP')" class="px-6 py-2.5 rounded-md text-sm font-bold transition-all bg-emerald-500 text-slate-900 shadow-sm">Vantage Core (ATP)</button>
                <button id="btn-prime" onclick="changerCircuit('WTA')" class="px-6 py-2.5 rounded-md text-sm font-bold transition-all text-slate-400 hover:text-white">Vantage Prime (WTA)</button>
            </div>
        </div>

        <div class="mb-14">
            <h2 class="text-lg font-bold text-white mb-6 flex items-center space-x-2">
                <svg class="w-5 h-5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
                <span>Performances Globales Vérifiées</span>
            </h2>
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4">
                <div class="bg-slate-800/40 border border-slate-700/60 rounded-xl p-5 backdrop-blur"><div class="text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-1">Profit Net Généré</div><div id="kpi-profit" class="text-2xl font-mono font-bold text-white">-- €</div></div>
                <div class="bg-slate-800/40 border border-slate-700/60 rounded-xl p-5 backdrop-blur"><div class="text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-1">Taux de Réussite</div><div id="kpi-winrate" class="text-2xl font-mono font-bold text-white">-- %</div></div>
                <div class="bg-slate-800/40 border border-slate-700/60 rounded-xl p-5 backdrop-blur"><div class="text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-1">ROI (Yield)</div><div id="kpi-roi" class="text-2xl font-mono font-bold text-white">-- %</div></div>
                <div class="bg-slate-800/40 border border-slate-700/60 rounded-xl p-5 backdrop-blur"><div class="text-[10px] uppercase tracking-wider text-slate-400 font-bold mb-1">Matchs Validés</div><div id="kpi-total" class="text-2xl font-mono font-bold text-white">--</div></div>
            </div>
        </div>

        <hr class="border-slate-800 mb-10">

        <div class="mb-8">
            <div class="flex items-center space-x-2 text-emerald-400 text-xs font-semibold tracking-wider uppercase mb-2">
                <span class="flex h-2 w-2 relative"><span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-emerald-400 opacity-75"></span><span class="relative inline-flex rounded-full h-2 w-2 bg-emerald-500"></span></span>
                <span id="titre-live">Analyse Live en cours...</span>
            </div>
            <h1 class="text-3xl font-bold tracking-tight text-white">Opportunités du Jour</h1>
        </div>

        <div id="match-container" class="grid gap-6 md:grid-cols-2 relative"></div>
    </main>

    <script>
        const SUPABASE_URL = 'https://otbonobfeyurkfuwavoa.supabase.co';
        const SUPABASE_KEY = 'sb_publishable_8tjc55jb1aAqJGc_n3TCJQ_Twxl3q_P';
        const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        let donneesGlobales = []; 
        let circuitActif = 'ATP'; 
        let sessionActuelle = null;
        let isVIP = false; 

        // --- GESTION DE L'AUTHENTIFICATION ---
        async function verifierSession() {
            const { data, error } = await supabaseClient.auth.getSession();
            sessionActuelle = data.session;
            
            if (sessionActuelle) {
                // Si connecté, on va lire son statut dans la table profiles
                const { data: profile } = await supabaseClient
                    .from('profiles')
                    .select('is_vip')
                    .eq('id', sessionActuelle.user.id)
                    .single();
                
                isVIP = profile ? profile.is_vip : false;
            } else {
                isVIP = false;
            }
            
            mettreAJourNavigation();
            afficherInterface();
        }

        function mettreAJourNavigation() {
            const navContainer = document.getElementById('nav-actions');
            if (sessionActuelle) {
                const statusVIP = isVIP 
                    ? '<span class="bg-emerald-500/20 text-emerald-400 border border-emerald-500/30 text-xs font-bold px-2 py-1 rounded">VIP ACTIF</span>'
                    : '<a href="#" class="text-emerald-400 hover:text-emerald-300 text-sm font-bold underline mr-2">Devenir VIP</a>';

                navContainer.innerHTML = `
                    <div class="flex items-center space-x-4">
                        ${statusVIP}
                        <button onclick="seDeconnecter()" class="text-slate-400 hover:text-white text-sm font-semibold transition-colors">Déconnexion</button>
                    </div>
                `;
            } else {
                navContainer.innerHTML = `
                    <button onclick="ouvrirModal()" class="bg-slate-800 hover:bg-slate-700 border border-slate-700 text-white text-sm font-semibold py-2 px-4 rounded transition-colors">Connexion / Inscription</button>
                    <button onclick="ouvrirModal()" class="bg-emerald-500 hover:bg-emerald-400 text-slate-900 text-sm font-bold py-2 px-4 rounded shadow-[0_0_10px_rgba(16,185,129,0.3)] transition-all">Devenir VIP</button>
                `;
            }
        }

        function ouvrirModal() { document.getElementById('auth-modal').classList.remove('hidden'); }
        function fermerModal() { 
            document.getElementById('auth-modal').classList.add('hidden'); 
            document.getElementById('auth-error').classList.add('hidden');
            document.getElementById('auth-success').classList.add('hidden');
        }

        function afficherErreur(msg) {
            const el = document.getElementById('auth-error');
            el.innerText = msg;
            el.classList.remove('hidden');
            document.getElementById('auth-success').classList.add('hidden');
        }

        function afficherSucces(msg) {
            const el = document.getElementById('auth-success');
            el.innerText = msg;
            el.classList.remove('hidden');
            document.getElementById('auth-error').classList.add('hidden');
        }

        async function creerCompte() {
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            if(!email || !password) return afficherErreur("Remplissez tous les champs.");

            const { data, error } = await supabaseClient.auth.signUp({ email, password });
            if (error) {
                afficherErreur(error.message);
            } else {
                afficherSucces("Compte créé avec succès ! Vous pouvez maintenant vous connecter.");
            }
        }

        async function seConnecter() {
            const email = document.getElementById('email-input').value;
            const password = document.getElementById('password-input').value;
            if(!email || !password) return afficherErreur("Remplissez tous les champs.");

            const { data, error } = await supabaseClient.auth.signInWithPassword({ email, password });
            if (error) {
                afficherErreur("Identifiants incorrects.");
            } else {
                fermerModal();
                verifierSession();
            }
        }

        async function seDeconnecter() {
            await supabaseClient.auth.signOut();
            verifierSession();
        }

        // --- CHARGEMENT DES MATCHS (Le même qu'avant) ---
        async function initialiserVantage() {
            try {
                const { data: historique, error } = await supabaseClient
                    .from('historical_predictions')
                    .select('*')
                    .order('match_date', { ascending: false });

                if (error) throw new Error(error.message);
                donneesGlobales = historique || [];
                
                await verifierSession();

            } catch (err) {
                document.getElementById('match-container').innerHTML = `<div class="bg-red-900/50 border border-red-500 text-red-200 p-6 rounded-xl col-span-2">🚨 Erreur : ${err.message}</div>`;
            }
        }

        function changerCircuit(circuit) { circuitActif = circuit; afficherInterface(); }

        function afficherInterface() {
            const btnCore = document.getElementById('btn-core');
            const btnPrime = document.getElementById('btn-prime');
            const titreLive = document.getElementById('titre-live');

            if (circuitActif === 'ATP') {
                btnCore.className = "px-6 py-2.5 rounded-md text-sm font-bold transition-all bg-emerald-500 text-slate-900 shadow-sm";
                btnPrime.className = "px-6 py-2.5 rounded-md text-sm font-bold transition-all text-slate-400 hover:text-white";
                titreLive.innerText = "Scanner Élite ATP Actif";
            } else {
                btnPrime.className = "px-6 py-2.5 rounded-md text-sm font-bold transition-all bg-emerald-500 text-slate-900 shadow-sm";
                btnCore.className = "px-6 py-2.5 rounded-md text-sm font-bold transition-all text-slate-400 hover:text-white";
                titreLive.innerText = "Bouclier Défensif WTA Actif";
            }

            const donneesFiltrees = donneesGlobales.filter(m => m.circuit === circuitActif);
            const parisTermines = donneesFiltrees.filter(m => m.is_value === true && (m.match_status === 'Gagné' || m.match_status === 'Perdu'));
            const totalParis = parisTermines.length;

            if (totalParis > 0) {
                const parisGagnes = parisTermines.filter(m => m.match_status === 'Gagné').length;
                const totalProfit = parisTermines.reduce((somme, m) => somme + (m.profit_loss || 0), 0);
                
                document.getElementById('kpi-profit').innerText = (totalProfit > 0 ? '+' : '') + totalProfit.toFixed(2) + ' €';
                document.getElementById('kpi-profit').className = "text-2xl font-mono font-bold " + (totalProfit > 0 ? "text-emerald-400" : "text-red-400");
                document.getElementById('kpi-winrate').innerText = ((parisGagnes / totalParis) * 100).toFixed(1) + ' %';
                document.getElementById('kpi-roi').innerText = (((totalProfit / (totalParis * 10)) * 100).toFixed(1)) + ' %';
                document.getElementById('kpi-roi').className = "text-2xl font-mono font-bold " + (totalProfit > 0 ? "text-emerald-400" : "text-red-400");
                document.getElementById('kpi-total').innerText = totalParis;
            }

            const container = document.getElementById('match-container');
            container.innerHTML = ''; 
            
            const aujourdhui = new Date().toISOString().split('T')[0];
            const matchsDuJour = donneesFiltrees.filter(m => m.match_date === aujourdhui);
            matchsDuJour.sort((a, b) => (b.is_value === true) - (a.is_value === true));

            if (matchsDuJour.length === 0) {
                container.innerHTML = `<div class="col-span-2 text-center py-10 bg-slate-800/20 rounded-xl border border-dashed border-slate-700"><p class="text-slate-400">Le robot n'a pas encore validé de matchs pour aujourd'hui.</p></div>`;
                return;
            }

            matchsDuJour.forEach(match => {
                const isValue = match.is_value;
                let showTeaser = isValue && !isVIP; // LE SECRET EST ICI
                
                let playerA = showTeaser ? '<span class="blur-md select-none text-slate-500">Joueur Masqué A</span>' : match.player_a;
                let playerB = showTeaser ? '<span class="blur-md select-none text-slate-500">Joueur Masqué B</span>' : match.player_b;
                let coteBook = showTeaser ? '<span class="blur-sm select-none">?.??</span>' : match.odds_bookmaker;
                let coteIA = showTeaser ? '<span class="blur-sm select-none">?.??</span>' : match.odds_ia;
                let proba = showTeaser ? '<span class="blur-sm select-none">??%</span>' : match.proba_ia + '%';

                const borderClass = isValue ? 'border-emerald-500/50 shadow-[0_0_15px_rgba(16,185,129,0.1)]' : 'border-slate-700/60 opacity-60';
                
                const overlayTeaser = showTeaser 
                    ? `<div class="absolute inset-0 z-10 flex flex-col items-center justify-center bg-slate-900/80 backdrop-blur-[3px] rounded-xl border border-emerald-500/30">
                            <svg class="w-10 h-10 text-emerald-400 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>
                            <h3 class="text-white font-bold text-lg mb-1">Pronostic Verrouillé</h3>
                            <button onclick="ouvrirModal()" class="mt-4 bg-gradient-to-r from-emerald-500 to-emerald-400 text-slate-900 font-bold py-2 px-6 rounded-full text-sm hover:scale-105 transition-transform">
                                🔓 Se connecter pour voir
                            </button>
                       </div>` 
                    : '';

                const htmlCarte = `
                    <div class="relative bg-slate-800/40 border ${borderClass} rounded-xl p-6 flex flex-col justify-between transition-all duration-300 overflow-hidden">
                        ${overlayTeaser}
                        <div>
                            <div class="flex items-center justify-between text-xs text-slate-400 font-medium mb-4">
                                <span class="bg-slate-700/50 px-2.5 py-1 rounded-full">🏆 ${match.tournament}</span>
                            </div>
                            <div class="space-y-2 mb-6">
                                <div class="flex justify-between items-center text-lg font-semibold text-white"><span>${playerA}</span></div>
                                <div class="text-xs text-slate-500 font-bold px-1">VS</div>
                                <div class="flex justify-between items-center text-lg font-semibold text-slate-300"><span>${playerB}</span></div>
                            </div>
                        </div>
                        <div class="border-t border-slate-700/50 pt-4 bg-slate-800/20 -mx-6 -mb-6 p-6 rounded-b-xl">
                            <div class="grid grid-cols-2 gap-4 text-center mb-4">
                                <div class="bg-slate-900/40 rounded-lg p-2.5 border border-slate-800">
                                    <div class="text-[10px] uppercase tracking-wider text-slate-500 font-bold mb-0.5">Cote Bookmaker</div>
                                    <div class="text-xl font-mono font-bold text-white">${coteBook}</div>
                                </div>
                                <div class="bg-slate-900/40 rounded-lg p-2.5 border border-slate-800">
                                    <div class="text-[10px] uppercase tracking-wider text-slate-500 font-bold mb-0.5">Cote IA Vantage</div>
                                    <div class="text-xl font-mono font-bold ${isValue ? 'text-emerald-400' : 'text-slate-400'}">${coteIA}</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;
                container.innerHTML += htmlCarte;
            });
        }

        window.addEventListener('DOMContentLoaded', initialiserVantage);
    </script>
</body>
</html>
